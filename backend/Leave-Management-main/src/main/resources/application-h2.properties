# =====================================================
# Configuration ALTERNATIVE avec H2 (Base de données en mémoire)
# =====================================================
# Cette configuration permet de tester l'application sans MySQL
# Copier ce contenu dans application.properties pour utiliser H2

# =====================================================
# Configuration H2 Database
# =====================================================
spring.datasource.url=jdbc:h2:mem:conges_db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Console H2 (accessible via navigateur)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# =====================================================
# Configuration JPA/Hibernate pour H2
# =====================================================
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# =====================================================
# Configuration du serveur
# =====================================================
server.port=8080

# =====================================================
# Configuration de l'application
# =====================================================
application.name=Leave Management System
application.url=http://localhost:8080
application.leaveRequestReminderDays=3
application.lowBalanceThreshold=5

# =====================================================
# Configuration Logging
# =====================================================
logging.level.com.rh.conges=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG

# =====================================================
# Configuration DevTools
# =====================================================
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# =====================================================
# INSTRUCTIONS D'UTILISATION
# =====================================================
# 1. Copier ce fichier dans src/main/resources/application.properties
# 2. Redémarrer l'application: ./mvnw spring-boot:run
# 3. Accéder ŕ la console H2: http://localhost:8080/h2-console
# 4. Paramčtres de connexion H2:
#    - JDBC URL: jdbc:h2:mem:conges_db
#    - User Name: sa
#    - Password: (laisser vide)
# 5. Les données sont PERDUES au redémarrage (base en mémoire)
#
# Pour une base persistante avec H2, utiliser:
# spring.datasource.url=jdbc:h2:file:./data/conges_db

