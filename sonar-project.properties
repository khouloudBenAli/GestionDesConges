sonar.organization=khouloudBenAli
sonar.projectKey=khouloudBenAli_GestionDesConges
sonar.projectName=GestionDesConges

# Sources analysees (backend Java multi-module + frontend React/TS)
sonar.sources=backend/leave-management-microservices/eureka-server/src/main,backend/leave-management-microservices/employee-service/src/main,backend/leave-management-microservices/leave-service/src/main,backend/leave-management-microservices/api-gateway/src/main,frontend/Leave-Management-frontend/src
sonar.tests=backend/leave-management-microservices/eureka-server/src/test,backend/leave-management-microservices/employee-service/src/test,backend/leave-management-microservices/leave-service/src/test,backend/leave-management-microservices/api-gateway/src/test

# Java (compile + classes pour l'analyse cross-module)
sonar.java.binaries=backend/leave-management-microservices/**/target/classes
sonar.java.test.binaries=backend/leave-management-microservices/**/target/test-classes

# Rapports de couverture
sonar.coverage.jacoco.xmlReportPaths=backend/leave-management-microservices/**/target/site/jacoco/jacoco.xml
sonar.javascript.lcov.reportPaths=frontend/Leave-Management-frontend/coverage/lcov.info

# Exclusions
sonar.exclusions=**/node_modules/**,**/target/**,**/dist/**,**/*.config.js,**/*.config.ts
sonar.coverage.exclusions=**/*.config.js,**/*.config.ts,**/main.tsx,**/*.d.ts

sonar.sourceEncoding=UTF-8
